apiVersion: serving.knative.dev/v1
kind: Service
metadata:
    name: $SERVICE_NAME
    labels:
        cloud.googleapis.com/location: $GCP_CLOUD_RUN_REGION
    annotations:
        run.googleapis.com/launch-stage: GA
        run.googleapis.com/ingress: all
spec:
    template:
        metadata:
            annotations:
                autoscaling.knative.dev/minScale: "0"
                autoscaling.knative.dev/maxScale: "1"
                run.googleapis.com/cpu-throttling: "true"
        spec:
            containerConcurrency: 90
            containers:
                - image: $IMAGE
                  ports:
                      - name: http1
                        containerPort: 4000
                  resources:
                      limits:
                          cpu: "1"
                          memory: 256Mi
                  env:
                      - name: GOOGLE_CLOUD_PROJECT
                        value: $GOOGLE_CLOUD_PROJECT
                      - name: GCS_BUCKET_NAME
                        value: $GCS_BUCKET_NAME
                      - name: GCS_UPLOAD_BUCKET_NAME
                        value: $GCS_UPLOAD_BUCKET_NAME
                      - name: GCS_HOSTED_BUCKET_NAME
                        value: $GCS_HOSTED_BUCKET_NAME
                      - name: CORS_ALLOWED_ORIGINS
                        value: $CORS_ALLOWED_ORIGINS
                      - name: API_BASE_URL
                        value: $API_BASE_URL
                      - name: FIREBASE_API_KEY
                        value: $FIREBASE_API_KEY
                      - name: POSTMARK_FROM_EMAIL
                        value: $POSTMARK_FROM_EMAIL
                      - name: POSTMARK_SERVER_TOKEN
                        valueFrom:
                            secretKeyRef:
                                key: latest
                                name: $POSTMARK_SECRET_NAME
    traffic:
        - percent: 100
          latestRevision: true
