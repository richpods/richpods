}

query GetRichPod($id: ID!) {
  richPod(id: $id) {
    ...RichPodFields
    origin {
      id
      title
      link
      feedUrl
      artworkUrl
      verified
      episode {
        guid
        title
        artworkUrl
        link
        media {
          url
          type
          length
          checksum
        }
      }
    }
    chapters {
      ...ChapterFields
